<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- The MUSAIT Architectural Portal (Forming a structural 'M' Bridge) -->
  <g id="MusaitBridge">
    <!-- Left Pillar (The BIM/Revit Side) -->
    <line x1="6" y1="24" x2="6" y2="10" stroke="#1e293b" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" />
    
    <!-- The Live Context Bridge (The dynamic connection spanning across) -->
    <path d="M 6,10 L 11,18 L 16,13 L 21,18 L 26,10" stroke="#0284c7" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none" />
    
    <!-- Right Pillar (The AI Ecosystem Side) -->
    <line x1="26" y1="10" x2="26" y2="24" stroke="#1e293b" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" />
  </g>

  <!-- Minimal Data Nodes (Representing the active, available live link) -->
  <circle cx="6" cy="10" r="2" fill="#0284c7" />
  <circle cx="26" cy="10" r="2" fill="#0284c7" />
  
  <!-- Central "Live" Connection Point -->
  <circle cx="16" cy="13" r="1.5" fill="#38bdf8" />
</svg>
