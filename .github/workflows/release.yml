name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-2022

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            8.x
            10.x

      - name: Install Inno Setup
        run: choco install innosetup --version=6.7.1 -y

      - name: Build Inno setup
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}".TrimStart("v")
          .\installer\build-inno.ps1 -ProductVersion $version

      - name: Add unsigned artifact notice
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}".TrimStart("v")
          @"
          ## Installer notice

          Musait $version is currently unsigned. Windows SmartScreen may warn before running the setup EXE.

          Verify downloads with the SHA256 checksum file attached to this release.
          "@ | Set-Content -Path dist\RELEASE-NOTES.md -Encoding utf8

      - name: Verify release artifacts
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}".TrimStart("v")
          $expected = @(
            "dist\Musait-Setup.exe",
            "dist\Musait-Setup.sha256",
            "dist\RELEASE-NOTES.md"
          )
          foreach ($path in $expected) {
            if (-not (Test-Path $path)) {
              throw "Missing release artifact: $path"
            }
          }

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: dist\RELEASE-NOTES.md
          generate_release_notes: true
          files: |
            dist\Musait-Setup.exe
            dist\Musait-Setup.sha256
